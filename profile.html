<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1e56a0;
            --rescue-red: #e63946;
            --touch-green: #22a55b;
            --text-dark: #1f2937;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-text-size-adjust: 100%;
        }

        .phone-container {
            width: 100%;
            max-width: 448px;
            min-height: 100dvh;
            height: 100dvh;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 480px) {
            body {
                background-color: #ffffff;
                align-items: stretch;
            }

            .phone-container {
                width: 100vw;
                max-width: none;
                box-shadow: none;
            }
        }

        .back-btn {
            font-size: 24px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: bold;
            min-width: 44px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .profile-header {
            border-bottom: 1px solid #f1f5f9;
        }

        .profile-item {
            transition: background 0.2s ease, color 0.2s ease;
        }

        .profile-item:hover {
            background: #f8fafc;
        }

        .primary-btn {
            background: linear-gradient(135deg, #f85050, #e63946);
            color: #ffffff;
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.3);
        }

        .primary-btn:hover {
            filter: brightness(0.98);
        }

        .volunteer-logo {
            mix-blend-mode: multiply;
        }

        .avatar-button {
            border: 0;
            padding: 0;
            background: transparent;
            cursor: pointer;
            border-radius: 9999px;
        }

        .avatar-button:focus-visible {
            outline: 2px solid #1e56a0;
            outline-offset: 3px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .language-panel {
            display: none;
        }

        .language-panel.is-open {
            display: block;
        }
    </style>
</head>

                pageTitle: 'वापरकर्ता प्रोफाइल', profile: 'प्रोफाइल', myReports: 'माझे अहवाल', nearbyNgos: 'जवळची NGO', volunteerWithUs: 'आमच्यासोबत स्वयंसेवक बना', appLanguage: 'ॲप भाषा', helpFaq: 'मदत आणि FAQ', emergencyCall: 'आपत्कालीन कॉल', logout: 'लॉग आउट', impactStats: 'प्रभाव आकडेवारी', reportsFiled: 'नोंदवलेले अहवाल:', resolved: 'निकाली:', openCases: 'उघडी प्रकरणे:', community: 'समुदाय:', communityBadges: 'समुदाय बॅजेस:', editPhoto: 'फोटो संपादित करा', save: 'सेव्ह', saving: 'सेव्ह होत आहे...', chooseLanguage: 'तुमची भाषा निवडा आणि सेव्ह करा.', languageSaved: 'भाषा यशस्वीपणे सेव्ह झाली.', languageSaveError: 'आत्ता भाषा अपडेट करता आली नाही.', avatarUpdated: 'प्रोफाइल फोटो अपडेट झाला.', avatarDefault: 'तपशील आणि फोटो अपडेट करण्यासाठी Edit photo वर टॅप करा.', avatarError: 'सर्व्हरवरून प्रोफाइल लोड झाले नाही.', userFallback: 'वापरकर्ता', phoneNotAdded: 'फोन जोडलेला नाही', phoneNotAvailable: 'फोन उपलब्ध नाही', backAria: 'मागे जा', editPhotoAria: 'प्रोफाइल फोटो संपादित करा', languageSelectAria: 'ॲप भाषा निवडा'
            },
            gu: {
                pageTitle: 'યુઝર પ્રોફાઇલ', profile: 'પ્રોફાઇલ', myReports: 'મારા રિપોર્ટ્સ', nearbyNgos: 'નજીકના NGO', volunteerWithUs: 'અમારા સાથે વોલન્ટિયર બનો', appLanguage: 'એપ ભાષા', helpFaq: 'મદદ અને FAQ', emergencyCall: 'ઇમરજન્સી કૉલ', logout: 'લૉગ આઉટ', impactStats: 'અસર આંકડા', reportsFiled: 'ફાઇલ કરેલ રિપોર્ટ્સ:', resolved: 'ઉકેલાયેલ:', openCases: 'ખુલ્લા કેસ:', community: 'સમુદાય:', communityBadges: 'સમુદાય બેજ:', editPhoto: 'ફોટો સંપાદિત કરો', save: 'સેવ', saving: 'સેવ થઈ રહ્યું છે...', chooseLanguage: 'તમારી ભાષા પસંદ કરીને સેવ કરો.', languageSaved: 'ભાષા સફળતાપૂર્વક સેવ થઈ.', languageSaveError: 'હમણાં ભાષા અપડેટ થઈ શકી નથી.', avatarUpdated: 'પ્રોફાઇલ ફોટો અપડેટ થયો.', avatarDefault: 'વિગતો અને ફોટો અપડેટ કરવા Edit photo દબાવો.', avatarError: 'સર્વર પરથી પ્રોફાઇલ લોડ થઈ શકી નથી.', userFallback: 'યુઝર', phoneNotAdded: 'ફોન ઉમેરેલ નથી', phoneNotAvailable: 'ફોન ઉપલબ્ધ નથી', backAria: 'પાછા જાઓ', editPhotoAria: 'પ્રોફાઇલ ફોટો સંપાદિત કરો', languageSelectAria: 'એપ ભાષા પસંદ કરો'
            }
        };

        const languageLabels = {
            en: 'English',
            hi: 'Hindi',
            bn: 'Bengali',
            ta: 'Tamil',
            te: 'Telugu',
            mr: 'Marathi',
            gu: 'Gujarati'
        };

        let activeLanguageCode = 'en';

        function languageName(code) {
            return languageLabels[code] || languageLabels.en;
        }

        function t(key) {
            const lang = translations[activeLanguageCode] || translations.en;
            return lang[key] || translations.en[key] || '';
        }

        function renderAvatarHint() {
            if (avatarHintState === 'updated') {
                avatarHint.textContent = t('avatarUpdated');
                avatarHint.className = 'text-xs text-green-600 mt-1';
                return;
            }
            if (avatarHintState === 'error') {
                avatarHint.textContent = t('avatarError');
                avatarHint.className = 'text-xs text-red-500 mt-1';
                return;
            }
            avatarHint.textContent = t('avatarDefault');
            avatarHint.className = 'text-xs text-gray-400 mt-1';
        }

        function renderLanguageMessage() {
            if (languageMessageState === 'chooser') {
                appLanguageMessage.textContent = t('chooseLanguage');
                appLanguageMessage.className = 'text-xs text-gray-400 mt-2';
                return;
            }
            if (languageMessageState === 'saved') {
                appLanguageMessage.textContent = t('languageSaved');
                appLanguageMessage.className = 'text-xs text-green-600 mt-2';
                return;
            }
            if (languageMessageState === 'error') {
                appLanguageMessage.textContent = t('languageSaveError');
                appLanguageMessage.className = 'text-xs text-red-500 mt-2';
                return;
            }
            appLanguageMessage.textContent = '';
            appLanguageMessage.className = 'text-xs text-gray-400 mt-2';
        }

        function applyTranslations() {
            document.title = t('pageTitle');
            profileTitle.textContent = t('profile');
            myReportsLabel.textContent = t('myReports');
            nearbyNgosLabel.textContent = t('nearbyNgos');
            volunteerWithUsLabel.textContent = t('volunteerWithUs');
            appLanguageLabel.textContent = t('appLanguage');
            helpFaqLabel.textContent = t('helpFaq');
            emergencyCallLabel.textContent = t('emergencyCall');
            logoutLabel.textContent = t('logout');
            impactStatsLabel.textContent = t('impactStats');
            reportsFiledLabel.textContent = t('reportsFiled');
            resolvedLabel.textContent = t('resolved');
            openCasesLabel.textContent = t('openCases');
            communityLabel.textContent = t('community');
            communityBadgesLabel.textContent = t('communityBadges');
            editAvatarButton.textContent = t('editPhoto');
            saveLanguageBtn.textContent = saveLanguageBtn.disabled ? t('saving') : t('save');
            backBtn.setAttribute('aria-label', t('backAria'));
            avatarButton.setAttribute('aria-label', t('editPhotoAria'));
            appLanguageSelect.setAttribute('aria-label', t('languageSelectAria'));
            if (profileNamePlaceholderKey) {
                profileName.textContent = t(profileNamePlaceholderKey);
            }
            if (profilePhonePlaceholderKey) {
                profilePhone.textContent = t(profilePhonePlaceholderKey);
            }
            renderAvatarHint();
            renderLanguageMessage();
        }

        function setLanguageUI(code) {
            const selectedCode = languageLabels[code] ? code : 'en';
            activeLanguageCode = selectedCode;
            appLanguageSelect.value = selectedCode;
            appLanguageCurrent.textContent = languageName(selectedCode);
            document.documentElement.lang = selectedCode;
            try {
                window.localStorage.setItem('appLanguage', selectedCode);
            } catch (error) {
                // no-op
            }
            applyTranslations();
        }

        function setLanguageMessageState(state) {
            languageMessageState = state;
            renderLanguageMessage();
        }

        async function loadProfileDetails() {
            try {
                const response = await fetch('/api/profile');
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Failed to load profile');
                }

                const data = await response.json();
                const profile = data.profile || {};

                setLanguageUI((profile.appLanguage || 'en').toLowerCase());

                if (profile.name) {
                    profileName.textContent = profile.name;
                    profileNamePlaceholderKey = null;
                } else {
                    profileNamePlaceholderKey = 'userFallback';
                    profileName.textContent = t('userFallback');
                }

                if (profile.phone) {
                    profilePhone.textContent = profile.phone;
                    profilePhonePlaceholderKey = null;
                } else {
                    profilePhonePlaceholderKey = 'phoneNotAdded';
                    profilePhone.textContent = t('phoneNotAdded');
                }

                if (profile.avatarData) {
                    avatarImage.src = profile.avatarData;
                    avatarHintState = 'updated';
                } else {
                    avatarImage.src = defaultAvatarSrc;
                    avatarHintState = 'default';
                }
                renderAvatarHint();
            } catch (error) {
                avatarImage.src = defaultAvatarSrc;
                setLanguageUI('en');
                profileNamePlaceholderKey = 'userFallback';
                profileName.textContent = t('userFallback');
                profilePhonePlaceholderKey = 'phoneNotAvailable';
                profilePhone.textContent = t('phoneNotAvailable');
                avatarHintState = 'error';
                renderAvatarHint();
            }
        }

        logoutBtn.addEventListener('click', function () {
            window.location.href = '/logout';
        });

        appLanguageToggle.addEventListener('click', function () {
            const isOpen = appLanguagePanel.classList.toggle('is-open');
            appLanguageToggle.setAttribute('aria-expanded', String(isOpen));
            if (isOpen) {
                setLanguageMessageState('chooser');
            } else {
                setLanguageMessageState('none');
            }
        });

        saveLanguageBtn.addEventListener('click', async function () {
            const selectedLanguage = (appLanguageSelect.value || 'en').toLowerCase();

            try {
                saveLanguageBtn.disabled = true;
                applyTranslations();

                const updateResponse = await fetch('/api/profile/language', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ appLanguage: selectedLanguage })
                });

                if (updateResponse.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                if (!updateResponse.ok) {
                    throw new Error('Unable to save language');
                }

                setLanguageUI(selectedLanguage);
                setLanguageMessageState('saved');
            } catch (error) {
                appLanguageSelect.value = activeLanguageCode;
                setLanguageMessageState('error');
            } finally {
                saveLanguageBtn.disabled = false;
                applyTranslations();
            }
        });

        async function loadProfileStats() {
            try {
                const response = await fetch('/api/profile/stats');
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Failed to load profile stats');
                }

                const data = await response.json();
                const summary = data.stats || {};

                document.getElementById('reportsFiledValue').textContent = String(summary.totalReports || 0);
                document.getElementById('resolvedValue').textContent = String(summary.resolvedReports || 0);
                document.getElementById('openCasesValue').textContent = String(summary.openReports || 0);
                document.getElementById('communityValue').textContent = String(summary.community || 0);
                document.getElementById('badgesValue').textContent = String(summary.badges || 0);
            } catch (error) {
                document.getElementById('reportsFiledValue').textContent = '0';
                document.getElementById('resolvedValue').textContent = '0';
                document.getElementById('openCasesValue').textContent = '0';
                document.getElementById('communityValue').textContent = '0';
                document.getElementById('badgesValue').textContent = '0';
            }
        }

        loadProfileDetails();
        loadProfileStats();

    </script>
</body>
</html>
