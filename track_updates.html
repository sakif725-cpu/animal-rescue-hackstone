<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8fafc;
            font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .back-btn {
            font-size: 24px;
            text-decoration: none;
            color: #374151;
            font-weight: bold;
            min-width: 44px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .map-bg {
            background-image: url('https://api.mapbox.com/styles/v1/mapbox/light-v10/static/0,0,1/400x200?access_token=YOUR_TOKEN_HERE');
            background-size: cover;
            background-position: center;
        }

        .report-card {
            background: #ffffff;
            border: 2px solid #cbd5e1;
            border-radius: 1.25rem;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }

        .report-thumb {
            width: 100%;
            height: 170px;
            object-fit: cover;
            display: block;
            background: #eff6ff;
        }

        .empty-state {
            border: 1px dashed #cbd5e1;
            border-radius: 1rem;
            padding: 24px;
            text-align: center;
            color: #64748b;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-50 flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-white min-h-screen flex flex-col shadow-lg">
        
        <header class="p-6 flex justify-between items-center">
            <a href="index.html" class="back-btn" id="backBtn" aria-label="Go back" onclick="goBack(); return false;">←</a>
            <h1 class="text-xl font-bold text-gray-900">Track Reports</h1>
            <div class="w-9" aria-hidden="true"></div>
        </header>

        <div class="px-6 mb-6">
            <div class="relative group">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-blue-500"></i>
                <input type="text" placeholder="Search by Case ID or keyword" 
                       class="w-full bg-blue-50/50 border-none py-3.5 pl-12 pr-4 rounded-2xl text-sm focus:ring-2 focus:ring-blue-100 outline-none transition-all">
            </div>
        </div>

        <div class="px-6 flex gap-3 mb-8">
            <button id="currentTabBtn" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-md shadow-blue-200 transition">Current</button>
            <button id="pastTabBtn" class="flex-1 py-3 bg-gray-100 text-gray-500 font-bold rounded-xl hover:bg-blue-600 hover:text-white hover:shadow-md hover:shadow-blue-200 transition">Past</button>
        </div>

        <div id="reportsContainer" class="mx-6 space-y-6"></div>

    </div>

    <script src="assets/app-language.js"></script>
    <script>
        function t(value) {
            if (window.AppLanguage && typeof window.AppLanguage.t === 'function') {
                return window.AppLanguage.t(value);
            }
            return value;
        }

        const currentTabBtn = document.getElementById('currentTabBtn');
        const pastTabBtn = document.getElementById('pastTabBtn');
        let activeSection = 'current';
        let reportSections = {
            current: [],
            past: []
        };

        function formatMinutesAgo(isoString) {
            const submittedAt = new Date(isoString);
            const diffMs = Date.now() - submittedAt.getTime();
            const mins = Math.max(1, Math.floor(diffMs / 60000));
            if (mins < 60) {
                return mins + ' ' + t('mins');
            }
            const hours = Math.floor(mins / 60);
            return hours + ' ' + t('hrs');
        }

        function formatClockTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function setTabState(section) {
            if (section === 'current') {
                currentTabBtn.className = 'flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-md shadow-blue-200 transition';
                pastTabBtn.className = 'flex-1 py-3 bg-gray-100 text-gray-500 font-bold rounded-xl hover:bg-blue-600 hover:text-white hover:shadow-md hover:shadow-blue-200 transition';
            } else {
                pastTabBtn.className = 'flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl shadow-md shadow-blue-200 transition';
                currentTabBtn.className = 'flex-1 py-3 bg-gray-100 text-gray-500 font-bold rounded-xl hover:bg-blue-600 hover:text-white hover:shadow-md hover:shadow-blue-200 transition';
            }
        }

        function renderSection(section) {
            const reports = reportSections[section] || [];

            const reportsContainer = document.getElementById('reportsContainer');
            if (!reports.length) {
                reportsContainer.innerHTML = '<div class="empty-state">' + (section === 'past' ? t('No past reports available') : t('No current reports available')) + '</div>';
                return;
            }

            reportsContainer.innerHTML = reports.map(function (report) {
                const submittedAt = report.submittedAt || new Date().toISOString();
                const shortAddress = (report.address || t('Unknown location')).split(',').slice(0, 2).join(',').trim();
                const photo = report.photoData || 'https://i.pravatar.cc/300?img=11';
                const statusTag = section === 'past' ? t('Resolved') : t('Open');
                const statusColor = section === 'past' ? 'text-green-700 bg-green-50' : 'text-blue-700 bg-blue-50';

                return '<article class="report-card">'
                    + '<div class="p-5">'
                    + '<div class="flex justify-between items-center mb-3">'
                    + '<span class="text-xs font-bold text-gray-500 uppercase tracking-tight">' + t('Case ID #') + (report.id || '0000') + '</span>'
                    + '<span class="text-xs font-semibold text-gray-400">' + formatMinutesAgo(submittedAt) + ' ' + t('ago') + '</span>'
                    + '</div>'
                    + '<div class="flex items-center justify-between mb-3">'
                    + '<h2 class="text-lg font-extrabold text-gray-800">' + t('Condition:') + ' ' + (report.condition || t('Injured')) + '</h2>'
                    + '<span class="text-xs font-bold px-2 py-1 rounded-full ' + statusColor + '">' + statusTag + '</span>'
                    + '</div>'
                    + '<p class="text-sm text-gray-600 mb-2"><i class="fas fa-location-dot text-blue-900 mr-2"></i>' + (shortAddress || t('Unknown location')) + '</p>'
                    + '<p class="text-xs text-gray-400">' + t('Updated at') + ' ' + formatClockTime(submittedAt) + '</p>'
                    + '</div>'
                    + '<img class="report-thumb" src="' + photo + '" alt="' + t('Reported animal photo') + '">'
                    + '</article>';
            }).join('');
        }

        async function loadReportSections() {
            try {
                const response = await fetch('/api/reports/sections');
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Failed to load sections');
                }

                const data = await response.json();
                reportSections.current = data.current || [];
                reportSections.past = data.past || [];
                renderSection(activeSection);
            } catch (error) {
                renderSection(activeSection);
            }
        }

        currentTabBtn.addEventListener('click', function () {
            activeSection = 'current';
            setTabState(activeSection);
            renderSection(activeSection);
        });

        pastTabBtn.addEventListener('click', function () {
            activeSection = 'past';
            setTabState(activeSection);
            renderSection(activeSection);
        });

        setTabState(activeSection);
        loadReportSections();

        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
                return;
            }
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
