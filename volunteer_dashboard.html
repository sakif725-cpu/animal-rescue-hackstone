<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7ff;
            --primary-blue: #00224d;
            --accent-blue: #3d7eff;
            --critical-red: #d9534f;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-text-size-adjust: 100%;
        }

        .phone-container {
            width: 100%;
            max-width: 448px;
            min-height: 100dvh;
            height: 100dvh;
            background: white;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.12);
            padding: 20px;
            box-sizing: border-box;
        }

        @media (max-width: 480px) {
            body {
                background-color: #ffffff;
                align-items: stretch;
                min-height: 100dvh;
            }

            .phone-container {
                width: 100vw;
                max-width: none;
                height: 100dvh;
                border-radius: 0;
                box-shadow: none;
            }
        }

        @media (min-width: 1024px) {
            body {
                padding: 24px;
                background-color: #eef2f7;
            }

            .phone-container {
                width: min(460px, 100%);
                height: min(860px, calc(100dvh - 48px));
            }
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary-blue);
        }
        .notification-bell {
            position: relative;
            background: #eef2ff;
            padding: 8px;
            border-radius: 10px;
            color: var(--accent-blue);
            border: none;
            cursor: pointer;
        }
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--critical-red);
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 50%;
        }

        /* Welcome Section */
        h1 { font-size: 1.6rem; color: var(--primary-blue); margin: 0; }
        .welcome-text { color: #666; font-size: 0.9rem; margin-top: 10px; line-height: 1.4; }

        /* Stats Section */
        .stats-list { margin-top: 20px; }
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-radius: 15px;
            margin-bottom: 10px;
            box-shadow: var(--card-shadow);
        }
        .stat-label { display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .stat-value { font-weight: bold; font-size: 1.1rem; color: var(--primary-blue); }
        .stat-value span { font-size: 0.8rem; font-weight: normal; }

        .yellow { background: linear-gradient(to right, #fff9e6, #fff); }
        .green { background: linear-gradient(to right, #eefaf6, #fff); }
        .blue { background: linear-gradient(to right, #f0f7ff, #fff); }

        .reports-section {
            margin-top: 20px;
            display: grid;
            gap: 12px;
            overflow-y: auto;
            max-height: calc(100dvh - 360px);
            padding-right: 2px;
        }

        .report-card {
            padding: 14px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            box-shadow: var(--card-shadow);
            background: #ffffff;
            display: grid;
            gap: 10px;
        }

        .report-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .report-id {
            font-size: 0.76rem;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .report-time {
            font-size: 0.74rem;
            color: #94a3b8;
            font-weight: 600;
        }

        .report-condition {
            font-size: 1rem;
            color: var(--primary-blue);
            font-weight: 700;
        }

        .report-meta {
            font-size: 0.85rem;
            color: #475569;
            line-height: 1.4;
        }

        .report-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .report-btn {
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }

        .report-btn-details {
            background: #e2e8f0;
            color: #1f2937;
        }

        .report-btn-map {
            background: var(--accent-blue);
            color: #ffffff;
        }

        .reports-empty {
            border: 1px dashed #cbd5e1;
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            color: #64748b;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .map-btn {
            background: var(--accent-blue);
            color: white;
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            text-decoration: none;
        }

        .panel-actions {
            display: flex;
            gap: 8px;
        }

        .panel-btn {
            border: none;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
        }

        .panel-btn-close {
            background: #e5e7eb;
            color: #1f2937;
        }

        .panel-btn-logout {
            background: #e95d6a;
            color: #ffffff;
        }

        .panel-btn-save {
            background: #3d7eff;
            color: #ffffff;
        }

        .profile-modal {
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 16px;
        }

        .profile-modal.hidden {
            display: none;
        }

        .profile-modal-card {
            width: min(360px, 100%);
            background: #ffffff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            display: grid;
            gap: 10px;
        }

        .profile-modal-title {
            margin: 0;
            font-size: 1rem;
            color: var(--primary-blue);
            font-weight: 700;
        }

        .profile-modal-row {
            margin: 0;
            font-size: 0.9rem;
            color: #374151;
        }

        .profile-field {
            display: grid;
            gap: 6px;
        }

        .profile-label {
            font-size: 0.82rem;
            color: #4b5563;
            font-weight: 600;
        }

        .profile-input,
        .profile-select {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 9px 10px;
            font-size: 0.9rem;
            color: #1f2937;
            background: #ffffff;
            box-sizing: border-box;
        }

        .profile-input:focus,
        .profile-select:focus {
            outline: none;
            border-color: #3d7eff;
            box-shadow: 0 0 0 3px rgba(61, 126, 255, 0.15);
        }

        .profile-save-status {
            margin: 0;
            font-size: 0.8rem;
            color: #4b5563;
            min-height: 16px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <div class="logo">
            <i class="fas fa-paw"></i> Smart Animal Rescue
        </div>
        <button type="button" id="openVolunteerProfile" class="notification-bell" aria-label="Open volunteer profile">
            <i class="fas fa-user"></i>
        </button>
    </div>

    <h1>Volunteer Dashboard</h1>
    <p id="welcomeText" class="welcome-text">Loading dashboard data...</p>

    <div class="stats-list">
        <div class="stat-item yellow">
            <div class="stat-label"><i class="fas fa-trophy" style="color:#d4a017"></i> Total Reports</div>
            <div id="totalReportsValue" class="stat-value">0</div>
        </div>
        <div class="stat-item blue">
            <div class="stat-label"><i class="fas fa-thumbs-up" style="color:#3d7eff"></i> Resolved Cases</div>
            <div id="resolvedCasesValue" class="stat-value">0</div>
        </div>
    </div>

    <div id="reportsSection" class="reports-section"></div>

    <div id="volunteerProfileModal" class="profile-modal hidden" aria-label="Volunteer profile details window" role="dialog" aria-modal="true">
        <div class="profile-modal-card">
            <h2 class="profile-modal-title">Profile Details</h2>
            <p id="modalVolunteerId" class="profile-modal-row">Volunteer ID: --</p>
            <div class="profile-field">
                <label for="modalVolunteerGenderInput" class="profile-label">Gender</label>
                <select id="modalVolunteerGenderInput" class="profile-select">
                    <option value="Not specified">Not specified</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="profile-field">
                <label for="modalVolunteerAgeGroupInput" class="profile-label">Age Group</label>
                <select id="modalVolunteerAgeGroupInput" class="profile-select">
                    <option value="Not specified">Not specified</option>
                    <option value="18-24">18-24</option>
                    <option value="25-34">25-34</option>
                    <option value="35-44">35-44</option>
                    <option value="45-54">45-54</option>
                    <option value="55+">55+</option>
                </select>
            </div>
            <div class="profile-field">
                <label for="modalVolunteerAreaInput" class="profile-label">Area</label>
                <input id="modalVolunteerAreaInput" class="profile-input" type="text" placeholder="Enter area">
            </div>
            <p id="modalVolunteerMemberSince" class="profile-modal-row">Member Since: Not available</p>
            <p id="profileSaveStatus" class="profile-save-status"></p>
            <div class="panel-actions">
                <button type="button" id="saveVolunteerProfile" class="panel-btn panel-btn-save">Save</button>
                <button type="button" id="closeVolunteerModal" class="panel-btn panel-btn-close">Close</button>
                <button type="button" id="modalVolunteerLogout" class="panel-btn panel-btn-logout">Logout Volunteer</button>
            </div>
        </div>
    </div>
</div>

<script>
    const openVolunteerProfile = document.getElementById('openVolunteerProfile');
    const volunteerProfileModal = document.getElementById('volunteerProfileModal');
    const saveVolunteerProfile = document.getElementById('saveVolunteerProfile');
    const closeVolunteerModal = document.getElementById('closeVolunteerModal');
    const modalVolunteerLogout = document.getElementById('modalVolunteerLogout');
    const modalVolunteerId = document.getElementById('modalVolunteerId');
    const modalVolunteerGenderInput = document.getElementById('modalVolunteerGenderInput');
    const modalVolunteerAgeGroupInput = document.getElementById('modalVolunteerAgeGroupInput');
    const modalVolunteerAreaInput = document.getElementById('modalVolunteerAreaInput');
    const modalVolunteerMemberSince = document.getElementById('modalVolunteerMemberSince');
    const profileSaveStatus = document.getElementById('profileSaveStatus');
    const reportsSection = document.getElementById('reportsSection');

    function formatMinutesAgo(isoString) {
        const submittedAt = new Date(isoString);
        const diffMs = Date.now() - submittedAt.getTime();
        const mins = Math.max(1, Math.floor(diffMs / 60000));
        if (mins < 60) {
            return mins + ' mins ago';
        }
        const hours = Math.floor(mins / 60);
        return hours + ' hrs ago';
    }

    function renderReportsList(reports) {
        if (!reports.length) {
            reportsSection.innerHTML = '<div class="reports-empty">No open injured-animal reports available</div>';
            return;
        }

        reportsSection.innerHTML = reports.map(function (report) {
            const address = report.address || 'Location unavailable';
            const reporterName = report.reporterName || 'Reporter';
            const reportTime = formatMinutesAgo(report.submittedAt || new Date().toISOString());
            const lat = report.latitude || '';
            const lon = report.longitude || '';
            const mapQuery = lat && lon ? (lat + ',' + lon) : address;
            const mapLink = 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(mapQuery) + '&travelmode=driving';
            const caseLink = 'vDashboard1.html?caseId=' + encodeURIComponent(report.id || '');

            return '<article class="report-card">'
                + '<div class="report-top">'
                + '<span class="report-id">Case #' + (report.id || '0000') + '</span>'
                + '<span class="report-time">' + reportTime + '</span>'
                + '</div>'
                + '<div class="report-condition">' + (report.condition || 'Injured Animal') + '</div>'
                + '<div class="report-meta"><strong>Reporter:</strong> ' + reporterName + '</div>'
                + '<div class="report-meta"><strong>Location:</strong> ' + address + '</div>'
                + '<div class="report-actions">'
                + '<a href="' + caseLink + '" class="report-btn report-btn-details">View Details</a>'
                + '<a href="' + mapLink + '" target="_blank" class="report-btn report-btn-map">Navigate</a>'
                + '</div>'
                + '</article>';
        }).join('');
    }

    async function loadOpenReportsList() {
        try {
            const response = await fetch('/api/reports/open');
            if (response.status === 401) {
                window.location.href = '/volunteer-auth';
                return;
            }

            if (!response.ok) {
                throw new Error('Failed to load open reports');
            }

            const data = await response.json();
            renderReportsList(data.reports || []);
        } catch (error) {
            reportsSection.innerHTML = '<div class="reports-empty">Unable to load reports right now</div>';
        }
    }

    function openVolunteerDetailModal() {
        volunteerProfileModal.classList.remove('hidden');
    }

    function closeVolunteerDetailModal() {
        volunteerProfileModal.classList.add('hidden');
    }

    async function loadDashboardSummary() {
        try {
            const response = await fetch('/api/dashboard/volunteer-summary');
            if (response.status === 401) {
                window.location.href = '/volunteer-auth';
                return;
            }

            if (!response.ok) {
                throw new Error('Failed to load dashboard');
            }

            const data = await response.json();
            const summary = data.summary || {};
            const latest = summary.latestReport || null;

            document.getElementById('welcomeText').textContent = 'Live data is synced from the server.';
            document.getElementById('totalReportsValue').textContent = String(summary.totalReports || 0);
            document.getElementById('resolvedCasesValue').textContent = String(summary.resolvedReports || 0);

            if (summary.currentVolunteerCode) {
                document.getElementById('welcomeText').textContent = 'Welcome ' + summary.currentVolunteerCode;
                modalVolunteerId.textContent = 'Volunteer ID: ' + summary.currentVolunteerCode;
            }

            const demographics = summary.currentVolunteerDemographics || {};
            modalVolunteerGenderInput.value = demographics.gender || 'Not specified';
            modalVolunteerAgeGroupInput.value = demographics.ageGroup || 'Not specified';
            modalVolunteerAreaInput.value = demographics.area || '';
            modalVolunteerMemberSince.textContent = 'Member Since: ' + (demographics.memberSince || 'Not available');
        } catch (error) {
            document.getElementById('welcomeText').textContent = 'Unable to load live server data right now.';
        }
    }

    loadDashboardSummary();
    loadOpenReportsList();

    openVolunteerProfile.addEventListener('click', function () {
        openVolunteerDetailModal();
    });

    closeVolunteerModal.addEventListener('click', function () {
        closeVolunteerDetailModal();
    });

    saveVolunteerProfile.addEventListener('click', async function () {
        profileSaveStatus.textContent = 'Saving...';
        profileSaveStatus.style.color = '#4b5563';

        try {
            const response = await fetch('/api/volunteer/profile', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    gender: modalVolunteerGenderInput.value,
                    ageGroup: modalVolunteerAgeGroupInput.value,
                    area: modalVolunteerAreaInput.value.trim()
                })
            });

            if (response.status === 401) {
                window.location.href = '/volunteer-auth';
                return;
            }

            if (!response.ok) {
                throw new Error('Save failed');
            }

            profileSaveStatus.textContent = 'Saved successfully.';
            profileSaveStatus.style.color = '#15803d';
            loadDashboardSummary();
        } catch (error) {
            profileSaveStatus.textContent = 'Could not save profile details.';
            profileSaveStatus.style.color = '#b91c1c';
        }
    });

    modalVolunteerLogout.addEventListener('click', function () {
        window.location.href = '/volunteer-logout';
    });

    volunteerProfileModal.addEventListener('click', function (event) {
        if (event.target === volunteerProfileModal) {
            closeVolunteerDetailModal();
        }
    });
</script>

</body>
</html>
