<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Volunteer Access</title>
	<link rel="stylesheet" href="login.css">
	<style>
		.title {
			letter-spacing: 0.2em;
		}

		.subtitle {
			margin: 0 0 20px;
			text-align: center;
			font-size: 0.86rem;
			color: rgba(238, 242, 243, 0.86);
		}

		.auth-actions {
			display: grid;
			gap: 10px;
			margin-top: 6px;
		}

		.secondary-btn {
			border: 1px solid rgba(255, 255, 255, 0.3);
			border-radius: 12px;
			padding: 12px 16px;
			background: rgba(255, 255, 255, 0.12);
			color: #f4f7f8;
			font-weight: 700;
			font-size: 0.95rem;
			cursor: pointer;
			transition: transform 0.2s ease, background 0.2s ease;
		}

		.secondary-btn:hover {
			transform: translateY(-2px);
			background: rgba(255, 255, 255, 0.18);
		}
	</style>
</head>
<body>
	<main class="page-wrap">
		<section class="login-card" aria-label="Volunteer authentication form">
			<div class="logo-wrap">
				<img
					src="assets/logo.jpg"
					onerror="this.onerror=null;this.src='assets/logo.jpeg';"
					alt="Logo"
					class="logo"
				>
				<p class="logo-text">Volunteer Access</p>
			</div>

			<h1 class="title">Volunteer Portal</h1>
			<p class="subtitle">Enter Volunteer ID and password, or register as a new volunteer.</p>

						<form id="volunteerForm" class="login-form auth-panel" action="/volunteer-auth" method="post">
							<label class="input-group" for="volunteerId">
								<span class="input-icon" aria-hidden="true">
									<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
										<circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
										<path d="M4 20C4 16.6863 7.58172 14 12 14C16.4183 14 20 16.6863 20 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
									</svg>
								</span>
								<input type="text" id="volunteerId" name="volunteer_id" placeholder="Volunteer ID" required>
							</label>

							<label class="input-group" for="volunteerPassword">
								<span class="input-icon" aria-hidden="true">
									<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
										<rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
										<path d="M8 10V7.5C8 5.01472 10.0147 3 12.5 3C14.9853 3 17 5.01472 17 7.5V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
									</svg>
								</span>
								<input type="password" id="volunteerPassword" name="password" placeholder="Password" required>
							</label>

							<div class="volunteer-actions">
								<button type="submit" name="action" value="login" class="login-btn">Volunteer Login</button>
								<button type="submit" name="action" value="register" class="secondary-btn">Register as Volunteer</button>
							</div>
						</form>
		</section>
	</main>
	<script src="assets/app-language.js"></script>
</body>
</html>
