<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Report Injured Animal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #1e56a0;
            --rescue-red: #e63946;
            --text-main: #333;
            --text-muted: #7f8c8d;
            --bg-body: #f4f7fe;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #e0e0e0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        .phone-container {
            width: 375px;
            min-width: 375px;
            max-width: 375px;
            height: 812px;
            min-height: 812px;
            background-color: white;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            flex: 0 0 auto;
            max-width: 100%;
        }

        @media (max-width: 480px) {
            body {
                background-color: #ffffff;
                align-items: stretch;
                min-height: 100dvh;
                overflow: auto;
            }

            .phone-container {
                width: 100vw;
                min-width: 100vw;
                max-width: 100vw;
                height: 100dvh;
                min-height: 100dvh;
                border-radius: 0;
                box-shadow: none;
            }

            .header {
                padding: calc(12px + env(safe-area-inset-top)) 16px 14px;
            }

            .content {
                padding: 0 16px calc(12px + env(safe-area-inset-bottom));
            }
        }

        @media (min-width: 1024px) {
            body {
                padding: 24px;
                background-color: #eef2f7;
            }

            .phone-container {
                width: min(460px, 100%);
                min-width: 0;
                max-width: 460px;
                height: min(860px, calc(100dvh - 48px));
                min-height: 0;
            }

            .header {
                padding: 34px 24px 18px;
            }

            .content {
                padding: 0 24px 20px;
            }
        }

        /* Header */
        .header {
            padding: 50px 20px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            font-size: 24px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: bold;
            min-width: 44px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .header h1 {
            font-size: 20px;
            margin: 0;
            color: var(--text-main);
        }

        .content {
            padding: 0 20px 20px;
            overflow-y: auto;
            flex-grow: 1;
            scrollbar-gutter: stable;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-overflow-scrolling: touch;
        }

        .content::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        /* Photo Section */
        .photo-upload {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .photo-upload img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .add-photos-btn {
            padding: 15px;
            color: var(--primary-blue);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            min-height: 48px;
            -webkit-tap-highlight-color: transparent;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Form Labels */
        .label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        /* Location Section */
        .location-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .loc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .address { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .edit-map { font-size: 12px; color: var(--primary-blue); text-decoration: none; font-weight: 600; }

        .coord-text {
            margin-top: 8px;
            font-size: 12px;
            color: #5f6b7a;
        }

        .location-status {
            margin-top: 8px;
            font-size: 12px;
            color: #c0392b;
        }

        .zoom-controls {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .zoom-label {
            font-size: 12px;
            color: #5f6b7a;
            min-width: 54px;
        }

        .zoom-slider {
            width: 100%;
            accent-color: var(--primary-blue);
            cursor: pointer;
        }

        .map-placeholder {
            width: 100%;
            height: 180px;
            background: #eef2f7;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a8596;
            font-size: 12px;
            text-align: center;
            overflow: hidden;
        }

        .map-placeholder iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* Select Input */
        .custom-select {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            background-color: #f9f9f9;
            font-family: inherit;
            margin-bottom: 20px;
            appearance: none;
        }

        .info-note {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 20px;
        }

        /* Submit Button */
        .submit-btn {
            background-color: var(--rescue-red);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(230, 57, 70, 0.3);
            min-height: 48px;
            -webkit-tap-highlight-color: transparent;
        }

        .edit-map {
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <a href="index.html" class="back-btn" id="backBtn" aria-label="Go back">←</a>
        <h1>Report Injured Animal</h1>
    </div>

    <div class="content">
        <div class="photo-upload">
            <img id="photoPreview" src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?auto=format&fit=crop&w=400" alt="Injured Animal">
            <div class="add-photos-btn" id="addPhotosBtn" role="button" tabindex="0" aria-label="Tap to add photos">
                <span>📷</span> Tap to add photos
            </div>
            <input class="sr-only" type="file" id="photoInput" accept="image/*" multiple>
        </div>

        <span class="label">Location</span>
        <div class="location-card">
            <div class="loc-header">
                <div class="address" id="addressText">📍 123 Street Name, City</div>
                <a href="#" class="edit-map" id="editMapBtn">Edit on Map</a>
            </div>
            <div class="map-placeholder" id="mapPlaceholder">Tap "Edit on Map" to load map preview</div>
            <div class="zoom-controls">
                <span class="zoom-label" id="zoomLabel">Zoom: 21</span>
                <input type="range" id="zoomSlider" class="zoom-slider" min="1" max="21" value="21" />
            </div>
            <div class="coord-text" id="coordinatesText">Coordinates: Not detected yet</div>
            <div class="location-status" id="locationStatus" aria-live="polite"></div>
        </div>

        <span class="label">Condition</span>
        <select class="custom-select">
            <option>Injured</option>
            <option>Sick</option>
            <option>Stray/Lost</option>
        </select>

        <p class="info-note">Normal rescue will be solved tomorrow.</p>

        <button class="submit-btn">
            ⚠️ Submit Emergency Report
        </button>
    </div>
</div>

<script>
    const backBtn = document.getElementById('backBtn');
    const addPhotosBtn = document.getElementById('addPhotosBtn');
    const photoInput = document.getElementById('photoInput');
    const photoPreview = document.getElementById('photoPreview');
    const editMapBtn = document.getElementById('editMapBtn');
    const addressText = document.getElementById('addressText');
    const mapPlaceholder = document.getElementById('mapPlaceholder');
    const zoomSlider = document.getElementById('zoomSlider');
    const zoomLabel = document.getElementById('zoomLabel');
    const coordinatesText = document.getElementById('coordinatesText');
    const locationStatus = document.getElementById('locationStatus');
    let currentLocation = null;

    function renderMap() {
        if (!currentLocation) {
            return;
        }

        const zoomValue = zoomSlider.value;
        const mapEmbedUrl = 'https://maps.google.com/maps?q=' + currentLocation.latitude + ',' + currentLocation.longitude + '&z=' + zoomValue + '&output=embed';
        mapPlaceholder.innerHTML = '<iframe title="Detected location map" src="' + mapEmbedUrl + '" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>';
    }

    backBtn.addEventListener('click', function (event) {
        if (window.history.length > 1) {
            event.preventDefault();
            window.history.back();
        }
    });

    addPhotosBtn.addEventListener('click', function () {
        photoInput.click();
    });

    addPhotosBtn.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            photoInput.click();
        }
    });

    photoInput.addEventListener('change', function () {
        const selectedFile = photoInput.files && photoInput.files[0];
        if (!selectedFile) {
            return;
        }

        const previewUrl = URL.createObjectURL(selectedFile);
        photoPreview.src = previewUrl;
        photoPreview.alt = selectedFile.name || 'Selected injured animal photo';
        addPhotosBtn.innerHTML = '<span>📷</span> Photo selected (' + photoInput.files.length + ')';
    });

    function setLocationError(message) {
        locationStatus.textContent = message;
    }

    async function reverseGeocode(latitude, longitude) {
        const apiUrl = 'https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=' + latitude + '&lon=' + longitude;
        const response = await fetch(apiUrl, {
            headers: {
                'Accept': 'application/json'
            }
        });

        if (!response.ok) {
            throw new Error('Unable to fetch address details.');
        }

        const data = await response.json();
        return data.display_name || null;
    }

    async function detectLocation() {
        if (!navigator.geolocation) {
            setLocationError('Geolocation is not supported by this browser.');
            return;
        }

        setLocationError('Detecting location...');

        navigator.geolocation.getCurrentPosition(
            async function (position) {
                const latitude = position.coords.latitude.toFixed(6);
                const longitude = position.coords.longitude.toFixed(6);
                currentLocation = { latitude: latitude, longitude: longitude };

                coordinatesText.textContent = 'Coordinates: ' + latitude + ', ' + longitude;
                renderMap();

                try {
                    const address = await reverseGeocode(latitude, longitude);
                    if (address) {
                        addressText.textContent = '📍 ' + address;
                    } else {
                        addressText.textContent = '📍 ' + latitude + ', ' + longitude;
                    }
                    setLocationError('');
                } catch (error) {
                    addressText.textContent = '📍 ' + latitude + ', ' + longitude;
                    setLocationError('Location detected. Address lookup unavailable right now.');
                }
            },
            function () {
                setLocationError('Unable to detect location. Please allow location access.');
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    }

    editMapBtn.addEventListener('click', function (event) {
        event.preventDefault();

        if (!currentLocation) {
            detectLocation();
            return;
        }

        const mapsUrl = 'https://www.google.com/maps?q=' + currentLocation.latitude + ',' + currentLocation.longitude;
        window.open(mapsUrl, '_blank');
    });

    zoomSlider.addEventListener('input', function () {
        zoomLabel.textContent = 'Zoom: ' + zoomSlider.value;
        renderMap();
    });
</script>

</body>
</html>
