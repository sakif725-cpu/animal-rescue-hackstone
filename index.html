<!DOCTYPE html>
<html lang="en">
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Smart Animal Rescue - Login</title>
	<link rel="stylesheet" href="login.css">
</head>
<body>
	<main class="page-wrap">
		<section class="login-card" aria-label="Login form">
			<div class="logo-wrap">
				<img
					src="assets/logo.jpg"
					onerror="this.onerror=null;this.src='assets/logo.jpeg';"
					alt="Logo"
					class="logo"
				>
				<p class="logo-text">GO GO GO</p>
			</div>

			<h1 class="title">Animals do have a Soul</h1>
			<p class="subtitle">Choose your role to continue</p>

			<div class="role-switch" role="tablist" aria-label="Choose login type">
				<button type="button" id="userTab" class="role-btn active" aria-selected="true">User</button>
				<button type="button" id="volunteerTab" class="role-btn" aria-selected="false">Volunteer</button>
			</div>

			<form id="userForm" class="login-form auth-panel" action="/login" method="post">
				<label class="input-group" for="username">
					<span class="input-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
							<circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
							<path d="M4 20C4 16.6863 7.58172 14 12 14C16.4183 14 20 16.6863 20 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
						</svg>
					</span>
					<input type="text" id="username" name="username" placeholder="Username" required>
				</label>

				<label class="input-group" for="password">
					<span class="input-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
							<rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
							<path d="M8 10V7.5C8 5.01472 10.0147 3 12.5 3C14.9853 3 17 5.01472 17 7.5V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
						</svg>
					</span>
					<input type="password" id="password" name="password" placeholder="Password" required>
				</label>

				<div class="meta-row">
					<label class="remember">
						<input type="checkbox" name="remember">
						<span>Remember Me</span>
					</label>
					<a href="#" class="forgot-link">Forgot Password</a>
				</div>

				<button type="submit" class="login-btn">Log In</button>
			</form>

			<form id="volunteerForm" class="login-form auth-panel is-hidden" action="/volunteer-auth" method="post">
				<label class="input-group" for="volunteerId">
					<span class="input-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
							<circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
							<path d="M4 20C4 16.6863 7.58172 14 12 14C16.4183 14 20 16.6863 20 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
						</svg>
					</span>
					<input type="text" id="volunteerId" name="volunteer_id" placeholder="Volunteer ID" required>
				</label>

				<label class="input-group" for="volunteerPassword">
					<span class="input-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
							<rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
							<path d="M8 10V7.5C8 5.01472 10.0147 3 12.5 3C14.9853 3 17 5.01472 17 7.5V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
						</svg>
					</span>
					<input type="password" id="volunteerPassword" name="password" placeholder="Password" required>
				</label>

				<div class="volunteer-actions">
					<button type="submit" name="action" value="login" class="login-btn">Volunteer Login</button>
					<button type="submit" name="action" value="register" class="secondary-btn">Register as Volunteer</button>
				</div>
			</form>

			<div class="divider"><span>Or continue with</span></div>

			<div class="social-row" aria-label="Social login options">
				<a class="social-btn" href="#" aria-label="Continue with Google">
					<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
						<path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.2.8 3.9 1.5l2.7-2.6C17 3.5 14.8 2.6 12 2.6A9.4 9.4 0 1 0 12 21.4c5.4 0 9-3.8 9-9.2 0-.6-.1-1.1-.2-1.6H12Z"/>
					</svg>
				</a>
				<a class="social-btn" href="#" aria-label="Continue with Apple">
					<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
						<path fill="currentColor" d="M16.6 12.4c0-2.1 1.7-3.1 1.8-3.2-1-1.4-2.5-1.6-3-1.6-1.3-.1-2.6.8-3.2.8-.7 0-1.7-.8-2.8-.8-1.4 0-2.8.8-3.5 2.1-1.5 2.6-.4 6.5 1 8.5.7 1 1.5 2.1 2.6 2.1 1 0 1.4-.6 2.7-.6 1.3 0 1.6.6 2.7.6 1.1 0 1.8-1 2.5-2 .8-1.1 1.1-2.3 1.1-2.4-.1 0-1.9-.7-1.9-3.5Zm-2-6.1c.6-.8 1-1.8.9-2.9-.9 0-2 .6-2.6 1.3-.6.7-1.1 1.8-1 2.8 1 0 2.1-.5 2.7-1.2Z"/>
					</svg>
				</a>
				<a class="social-btn" href="#" aria-label="Continue with Facebook">
					<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
						<path fill="#1877F2" d="M24 12.1C24 5.4 18.6 0 12 0S0 5.4 0 12.1c0 6 4.4 11 10.1 12v-8.5H7v-3.5h3.1V9.4c0-3.1 1.8-4.8 4.6-4.8 1.3 0 2.7.2 2.7.2v3h-1.5c-1.5 0-2 .9-2 1.9v2.3h3.4l-.6 3.5h-2.8V24c5.7-1 10.1-6 10.1-11.9Z"/>
					</svg>
				</a>
			</div>
		</section>
	</main>
	<script>
		const userTab = document.getElementById('userTab');
		const volunteerTab = document.getElementById('volunteerTab');
		const userForm = document.getElementById('userForm');
		const volunteerForm = document.getElementById('volunteerForm');

		function showUserPanel() {
			userTab.classList.add('active');
			volunteerTab.classList.remove('active');
			userTab.setAttribute('aria-selected', 'true');
			volunteerTab.setAttribute('aria-selected', 'false');
			userForm.classList.remove('is-hidden');
			volunteerForm.classList.add('is-hidden');
		}

		function showVolunteerPanel() {
			volunteerTab.classList.add('active');
			userTab.classList.remove('active');
			volunteerTab.setAttribute('aria-selected', 'true');
			userTab.setAttribute('aria-selected', 'false');
			volunteerForm.classList.remove('is-hidden');
			userForm.classList.add('is-hidden');
		}

		userTab.addEventListener('click', showUserPanel);
		volunteerTab.addEventListener('click', showVolunteerPanel);
	</script>
	<script src="assets/app-language.js"></script>
</body>
</html>

</body>
</html>
